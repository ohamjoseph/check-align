<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align-Check | Vérificateur d'alignement de texte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-200 font-sans h-screen flex flex-col overflow-hidden selection:bg-indigo-500/30">
    
    <!-- Top Navigation Bar -->
    <header class="flex-none bg-gray-900/80 backdrop-blur-md border-b border-gray-800 px-6 py-4 z-50 shadow-sm">
        <div class="w-full flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 shadow-[0_0_15px_rgba(99,102,241,0.4)] flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Align-Check</h1>
            </div>

            <div class="flex items-center gap-6 bg-gray-800/50 p-2 rounded-xl border border-gray-700/50">
                <div class="flex flex-col px-3">
                    <label for="source-file" class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Source (.txt)</label>
                    <input type="file" id="source-file" accept=".txt" class="block w-full text-sm text-gray-300
                        file:mr-4 file:py-1.5 file:px-4
                        file:rounded-md file:border-0
                        file:text-xs file:font-semibold
                        file:bg-indigo-500/10 file:text-indigo-400
                        hover:file:bg-indigo-500/20 file:cursor-pointer file:transition-colors cursor-pointer w-48"/>
                </div>
                
                <div class="w-px h-8 bg-gray-700 hidden sm:block"></div>

                <div class="flex flex-col px-3">
                    <label for="target-file" class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Cible (.txt)</label>
                    <input type="file" id="target-file" accept=".txt" class="block w-full text-sm text-gray-300
                        file:mr-4 file:py-1.5 file:px-4
                        file:rounded-md file:border-0
                        file:text-xs file:font-semibold
                        file:bg-emerald-500/10 file:text-emerald-400
                        hover:file:bg-emerald-500/20 file:cursor-pointer file:transition-colors cursor-pointer w-48"/>
                </div>

                <div class="flex gap-2 ml-2">
                    <button id="export-btn" class="hidden px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg border border-indigo-500 transition-all text-sm font-medium shadow-[0_0_10px_rgba(79,70,229,0.3)] active:scale-95 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Exporter
                    </button>
                    <button id="reset-btn" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white rounded-lg border border-gray-600 transition-all text-sm font-medium shadow-sm active:scale-95">
                        Effacer
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Dashboard & Filters -->
    <div id="dashboard" class="hidden transition-all duration-500 bg-gray-900/40 border-b border-gray-800/80 px-6 py-3 backdrop-blur-sm">
        <div class="max-w-full flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">Santé globale</span>
                    <div class="flex items-center gap-2 mt-0.5">
                        <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                            <div id="health-bar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <span id="health-pct" class="text-xs font-mono font-bold text-emerald-400">-%</span>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="bg-gray-800/40 border border-gray-700/50 rounded-lg px-3 py-1.5 flex items-center gap-3">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-500 font-bold uppercase leading-none">Alertes</span>
                            <span id="dash-alerts" class="text-sm font-bold text-amber-500">0</span>
                        </div>
                        <div class="w-px h-6 bg-gray-700/50"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-500 font-bold uppercase leading-none">Multi-phrases</span>
                            <span id="dash-multi" class="text-sm font-bold text-indigo-400">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div id="bulk-actions" class="hidden transition-all duration-300 items-center gap-2 bg-rose-500/10 border border-rose-500/30 px-3 py-1 rounded-lg">
                    <span id="selected-count" class="text-xs font-bold text-rose-400">0 sélectionnés</span>
                    <div class="w-px h-4 bg-rose-500/30 mx-1"></div>
                    <button id="delete-selected-rows" class="text-[10px] font-bold uppercase text-rose-400 hover:text-rose-300 transition-colors">Supprimer lignes</button>
                    <div class="w-px h-4 bg-rose-500/30 mx-1"></div>
                    <button id="delete-selected-cells" class="text-[10px] font-bold uppercase text-rose-400 hover:text-rose-300 transition-colors">Vider cellules</button>
                </div>

                <span class="text-xs font-semibold text-gray-400">Filtrer :</span>
                <div class="flex p-1 bg-gray-800/80 border border-gray-700 rounded-lg">
                    <button id="filter-all" class="px-3 py-1 text-xs font-bold rounded-md transition-all bg-gray-700 text-white shadow-sm">Tout</button>
                    <button id="filter-alerts" class="px-3 py-1 text-xs font-bold rounded-md transition-all text-gray-400 hover:text-white">Alertes seules</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <main class="flex-1 relative flex flex-col min-h-0 bg-gray-950">
        
        <!-- Empty State -->
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center opacity-100 transition-opacity duration-300">
            <div class="w-24 h-24 mb-6 rounded-3xl bg-gray-900 flex items-center justify-center border border-gray-800 shadow-2xl">
                <svg class="w-12 h-12 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
            </div>
            <h2 class="text-2xl font-semibold text-gray-200 mb-2">Espace de travail vide</h2>
            <p class="text-gray-500 max-w-md text-center">Sélectionnez un fichier source et un fichier cible via les boutons en haut pour commencer l'analyse d'alignement.</p>
            <button id="restore-session-btn" class="hidden mt-8 px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl border border-emerald-500 transition-all font-medium shadow-[0_0_15px_rgba(16,185,129,0.3)] flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Reprendre la session en cours
            </button>
        </div>

        <!-- Viewer -->
        <div id="viewer" class="hidden flex-1 flex flex-col h-full w-full opacity-0 transition-opacity duration-300">
            
            <!-- Column Headers -->
            <div class="grid grid-cols-[40px_1fr_140px_1fr] md:grid-cols-[40px_1fr_160px_1fr] bg-gray-900/90 backdrop-blur-sm border-b border-gray-800 shadow-sm sticky top-0 z-10 w-full pr-2">
                <div class="flex items-center justify-center border-r border-gray-800/50">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="select-all-rows">
                        <span class="cb-checkmark"></span>
                    </label>
                </div>
                <div class="py-3 px-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Source</div>
                <div class="py-3 px-4 text-xs font-bold text-gray-400 uppercase tracking-widest text-center border-x border-gray-800/50 bg-gray-900/50">Analyse</div>
                <div class="py-3 px-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Cible</div>
            </div>

            <!-- Content Area -->
            <div id="lines-container" class="flex-1 overflow-y-auto w-full pb-32 pl-6 pr-2 custom-scrollbar scroll-smooth">
                <!-- Rows injected by JS here -->
            </div>
        </div>
    </main>

    <!-- Footer Stats -->
    <footer id="stats-footer" class="hidden bg-gray-900 border-t border-gray-800 px-6 py-3 flex-none w-full">
        <div class="w-full flex justify-between items-center text-sm">
            <div class="flex gap-6">
                <div class="flex items-center gap-2 text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    <span id="total-lines" class="font-mono font-medium text-gray-200">0</span> lignes au total
                </div>
                <div class="flex items-center gap-2 text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <span id="alert-lines" class="font-mono font-bold">0</span> alertes globales
                </div>
            </div>
            <div class="text-xs text-gray-500">
                Align-Check v1.1
            </div>
        </div>
    </footer>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-20 right-6 flex flex-col gap-2 z-[100]"></div>

    <script src="app.js"></script>
</body>
</html>
